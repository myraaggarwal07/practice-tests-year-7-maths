
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decimal Test 2</title>
    <style>
        :root {
            --primary-blue: #2c3e50;
            --white: #ffffff;
            --success-green: #27ae60;
            --error-red: #e74c3c;
            --light-grey: #f4f7f6;
        }
        body { font-family: sans-serif; background-color: var(--light-grey); padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .header, .card { background: var(--white); padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .header { background: var(--primary-blue); color: var(--white); text-align: center; display: none; }
        .card { border-left: 5px solid #ccc; transition: 0.3s; }
        input[type="text"], input[type="date"] { padding: 8px; width: 100%; box-sizing: border-box; }
        .feedback { margin-top: 10px; padding: 10px; display: none; background: #f9f9f9; border: 1px solid #ddd; }
        button { background: var(--primary-blue); color: white; padding: 10px 20px; border: none; cursor: pointer; width: 100%; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="scoreBanner" class="header">
            <h2 id="resultText"></h2>
        </div>
        <div class="card">
            <h1>Decimal Test 2</h1>
            <label>Student Name: <input type="text" id="studentName"></label><br><br>
            <label>Date: <input type="date" id="testDate"></label>
        </div>
        <form id="quizForm">
            <div id="questionsContainer"></div>
            <button type="submit">Submit Test & Check Answers</button>
        </form>
    </div>
    <script>
        document.getElementById('testDate').valueAsDate = new Date();
        const questions = [
            { q: "What is the value of the digit 6 in 23.612?", a: "6 tenths or 0.6" },
            { q: "What is the value of the digit 6 in 17.46?", a: "6 hundredths or 0.06" },
            { q: "Express 8/10 as a decimal.", a: "0.8" },
            { q: "Express 23/100 as a decimal.", a: "0.23" },
            { q: "Express 5 7/10 as a decimal.", a: "5.7" },
            { q: "Express 14 83/100 as a decimal.", a: "14.83" },
            { q: "Compare 3.65 and 3.68 using < or >.", a: "<" },
            { q: "Compare 5.32 and 5.4 using < or >.", a: "<" },
            { q: "Round 19.7431 to 1 decimal place.", a: "19.7" },
            { q: "Round 46.148 to 1 decimal place.", a: "46.1" },
            { q: "Write 11.8627 correct to 2 decimal places.", a: "11.86" },
            { q: "Write 5.9156 correct to 2 decimal places.", a: "5.92" },
            { q: "Round 0.8971 to 2 decimal places.", a: "0.90" },
            { q: "Round 231.86 to 1 decimal place.", a: "231.9" },
            { q: "Round 9.458 to the nearest whole number.", a: "9" },
            { q: "Round 2.6132 to the nearest whole number.", a: "3" },
            { q: "Calculate 3.40 + 1.35.", a: "4.75" },
            { q: "Calculate 8.90 + 3.84.", a: "12.74" },
            { q: "Calculate 128.63 - 14.50.", a: "114.13" },
            { q: "Calculate 23.94 - 17.61.", a: "6.33" },
            { q: "Calculate 158.32 - 87.53.", a: "70.79" },
            { q: "Calculate 14.8 - 2.5.", a: "12.3" },
            { q: "Calculate 31.657 - 18.2.", a: "13.457" },
            { q: "How much greater is 262.5 than 76.31?", a: "186.19" },
            { q: "If a river level was 1.53m, 1.58m, 1.49m, 1.47m, 1.52m, 1.61m, on which day was it lowest?", a: "Day 4" }
        ];

        const container = document.getElementById('questionsContainer');
        questions.forEach((item, index) => {
            container.innerHTML += `
                <div class="card" id="q${index}">
                    <p>Q${index + 1}: ${item.q}</p>
                    <input type="text" id="ans${index}" placeholder="Your answer">
                    <div class="feedback" id="fb${index}"></div>
                </div>
            `;
        });

        document.getElementById('quizForm').addEventListener('submit', function(e) {
            e.preventDefault();
            let score = 0;
            questions.forEach((item, index) => {
                const userAns = document.getElementById('ans'+index).value.trim();
                const card = document.getElementById('q'+index);
                const fb = document.getElementById('fb'+index);
                if(userAns.toLowerCase() === item.a.toLowerCase()) {
                    score += 2;
                    card.style.borderLeftColor = 'var(--success-green)';
                    fb.innerHTML = "+2 Marks. Correct!";
                } else {
                    card.style.borderLeftColor = 'var(--error-red)';
                    fb.innerHTML = "0 Marks. The correct answer is " + item.a;
                }
                fb.style.display = 'block';
            });
            const banner = document.getElementById('scoreBanner');
            banner.style.display = 'block';
            document.getElementById('resultText').innerText = document.getElementById('studentName').value + ", your total score is: " + score + "/50 (" + (score/50*100) + "%)";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
</body>
</html>
